name: validate-i18n

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'i18n/**/*.json'
      - 'src/index.template.html'
      - 'tools/validate_i18n.py'
      - '.github/workflows/validate-i18n.yml'
  push:
    branches: [main, master]
    paths:
      - 'i18n/**/*.json'
      - 'src/index.template.html'
      - 'tools/validate_i18n.py'
      - '.github/workflows/validate-i18n.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate i18n parity and formatting
        run: python3 tools/validate_i18n.py
